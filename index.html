<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy – Less</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .app-name {
      font-size: 28px;
      font-weight: 500;
      color: #333333;
      margin-bottom: 8px;
    }
    .tagline {
      font-size: 14px;
      color: #8E8E8E;
      letter-spacing: 0.02em;
      margin-bottom: 48px;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: #E8E8E8;
      margin: 0 auto 48px;
    }
    .section-title {
      font-size: 15px;
      font-weight: 500;
      color: #333333;
      margin-bottom: 8px;
    }
    .description {
      font-size: 13px;
      color: #8E8E8E;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .links a {
      display: block;
      padding: 14px 24px;
      border: 0.5px solid #E8E8E8;
      border-radius: 12px;
      text-decoration: none;
      color: #333333;
      font-size: 14px;
    }
    .links a:hover {
      background: #F9F9F9;
    }
    .footer {
      font-size: 12px;
      color: #8E8E8E;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="app-name">Less</p>
    <p class="tagline">Log with less. Live more.</p>
    <div class="divider"></div>
    <p class="section-title">Privacy Policy</p>
    <p class="description">Please read our privacy policy to understand how we handle your data.</p>
    <div class="links">
      <a href="privacy-en.html">English</a>
      <a href="privacy-ja.html">日本語</a>
    </div>
    <p class="footer">© 2025 Nao Labs</p>
  </div>
</body>
</html>
